<!DOCTYPE html>
<html>
<head>
    <title>Food & Hospitality Management System</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #eef2f3; }

        .navbar { background-color: #2d6cdf; }  

        .nav-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .marquee {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 12s linear infinite;
            font-size: 26px;
            color: white;
            font-weight: bold;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        .nav-right { display: flex; gap: 10px; }

        .hero {
            height: 350px;
            background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center/cover;
            display: flex;
            align-items: center;
            padding-left: 50px;
            color: white;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
        }

        .hero div { position: relative; z-index: 2; }

        .food-card {
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .food-card img {
            height: 220px;
            object-fit: cover;
        }

        .form-box {
            width: 80%;
            margin-top: -50px;
            border-radius: 20px;
        }

        #cartPanel {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 250px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<!-- LOGIN POPUP -->
<div id="loginBox" style="display:none; position:fixed; top:30%; left:40%; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.3); z-index:999;">
    
    <h5>Login</h5>

    <input id="username" placeholder="Username" class="form-control mb-2">
    <input id="password" type="password" placeholder="Password" class="form-control mb-2">

    <button class="btn btn-success w-100 mb-2" onclick="register()">Register</button>
    <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
    <button class="btn btn-danger    w-100" onclick="closeLogin()">Close</button>

</div>

    <!-- APP START (IMPORTANT) -->
<div id="appContent" style="display:none;">

<!-- NAVBAR -->
<nav class="navbar px-4">
    <div class="nav-container">
        <div class="marquee">
            <span>🍔 Food & Hospitality Management System 🏥</span>
        </div>
        <div class="nav-right">
            <button class="btn btn-light" onclick="handleAuth()">Login</button>
            <button class="btn btn-warning">Cart</button>
        </div>
    </div>
</nav>



<!-- HERO -->
<div class="hero">
    <div>
        <h1>Order Delicious Food Easily</h1>
        <button class="btn btn-success" onclick="scrollToForm()">Order Now</button>
    </div>
</div>

<!-- FORM -->
<div class="container d-flex justify-content-center">
    <div class="card p-4 shadow form-box" id="formBox">

        <h4 class="text-center">Add / Update Order</h4>

        <div class="row mt-3">

            <div class="col-md-2">
                <input id="name" class="form-control" placeholder="Name">
            </div>

            <div class="col-md-2">
                <select id="item" class="form-select"></select>
            </div>

            <div class="col-md-2">
                <input id="qty" class="form-control" placeholder="Qty">
            </div>

            <div class="col-md-2">
                <input id="price" class="form-control" readonly placeholder="Price">
            </div>

            <div class="col-md-2">
                <input id="total" class="form-control" readonly placeholder="Total">
            </div>

            <div class="col-md-2">
                <button class="btn btn-success" onclick="saveOrder();addToCart()">Save</button>
            </div>

        </div>
    </div>
</div>

    <div class="row">

                <div class="card-body text-center">
                    <h5>Family Room</h5>
                    <p>₹3000 / night</p>
                    <button class="btn btn-primary" onclick="bookRoom('Family Room')">Book</button>
                </div>
            </div>
        </div>

        <!-- COUPLE ROOM -->
        <div class="col-md-3">
            <div class="card food-card">
                <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Couple Room</h5>
                    <p>₹2000 / night</p>
                    <button class="btn btn-primary" onclick="bookRoom('Couple Room')">Book</button>
                </div>
            </div>
        </div>

        <!-- DORMITORY -->
        <div class="col-md-3">
            <div class="card food-card">
                <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Dormitory</h5>
                    <p>₹800 / night</p>
                    <button class="btn btn-primary" onclick="bookRoom('Dormitory')">Book</button>
                </div>

    </div>
</div>

<div class="container mt-5">

    <h3 class="mb-3"> Rooms</h3>

    <div class="card p-3 mb-4">
        <div class="row">
            <div class="col-md-3">
                <input id="roomNumber" class="form-control" placeholder="Room No">
            </div>

            <div class="col-md-3">
                <select id="roomType" class="form-control">
                    <option>AC</option>
                    <option>Non-AC</option>
                </select>
            </div>

            <div class="col-md-3">
                <input id="roomPrice" class="form-control" placeholder="Price">
            </div>
            <div class="col-md-3">
                <button class="btn btn-success" onclick="addRoom()">Add Room</button>
            </div>

        </div>
    </div>

    <div class="row" id="roomsContainer"></div>

</div>



<!-- CART -->
<div id="cartPanel">
    <h5>🛒 Cart</h5>
    <ul id="cartItems"></ul>
    <h6>Total: ₹<span id="cartTotal">0</span></h6>

<button class="btn btn-primary mt-2 w-100" onclick="payNow()">
    Pay Now 💳
</button>

</div>
</div>

<script>

let cart = [];

// ================= FOOD =================

// ✅ Scroll
function scrollToForm() {
    document.getElementById("formBox")?.scrollIntoView({ behavior: 'smooth' });
}

// ✅ Select from cards
function selectItem(item) {
    document.getElementById("item").value = item;
    updatePrice();
    scrollToForm();
}

// ✅ LOAD MENU FROM BACKEND
function loadMenu() {
    fetch('/menu')
        .then(res => res.json())
        .then(data => {
            let dropdown = document.getElementById("item");
            dropdown.innerHTML = "";

            data.forEach(m => {
                let option = document.createElement("option");
                option.value = m.itemName;
                option.text = m.itemName + " - ₹" + m.price;
                option.setAttribute("data-price", m.price);
                dropdown.appendChild(option);
            });

            updatePrice();
        })
        .catch(() => {
            console.log("Menu API not working");
        });
}

// ✅ PRICE + TOTAL
function updatePrice() {
    let d = document.getElementById("item");
    let s = d.options[d.selectedIndex];

    if (!s) return;

    let price = s.getAttribute("data-price") || 0;
    let qty = document.getElementById("qty").value || 0;

    document.getElementById("price").value = price;
    document.getElementById("total").value = price * qty;
}

// ================= CART =================

function addToCart() {
    let item = document.getElementById("item").value;
    let qty = document.getElementById("qty").value;
    let total = document.getElementById("total").value;

    if (!item || !qty) return;

    cart.push({
    type: "food",
    item: item,
    qty: qty,
    total: total
    });
    renderCart();
}

function addRoomToCart(id, type, price) {

    // add to cart
    cart.push({
        item: "Room - " + type,
        qty: 1,
        total: price
    });

    updateCart();

    // also book room in backend
    fetch(`/rooms/book/${id}`, {
        method: "PUT"
    }).then(() => loadRooms());
}

function renderCart() {
    let list = document.getElementById("cartItems");
    if (!list) return;

    let totalSum = 0;
    list.innerHTML = "";

    cart.forEach(c => {
        totalSum += Number(c.total);
        list.innerHTML += `<li>${c.item} x ${c.qty} = ₹${c.total}</li>`;
    });

    let totalEl = document.getElementById("cartTotal");
    if (totalEl) totalEl.innerText = totalSum;
}

// ================= ORDER =================

function saveOrder() {
    let data = {
        customerName: document.getElementById("name").value,
        foodItem: document.getElementById("item").value,
        quantity: document.getElementById("qty").value
    };

    fetch('/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
}

// ================= ROOMS =================

// ✅ LOAD ROOMS
function loadRooms() {
    fetch('/rooms')
    .then(res => res.json())
    .then(data => {
        let container = document.getElementById("roomsContainer");
        if (!container) return;

        container.innerHTML = "";

        data.forEach(room => {
            container.innerHTML += `
                <div class="col-md-3 mb-3">
                    <div class="card p-3">
                        <h5>Room ${room.roomNumber}</h5>
                        <p>Type: ${room.type}</p>
                        <p>₹${room.price}</p>
                        <p>${room.available ? "Available" : "Booked"}</p>

                    <button class="btn btn-primary btn-sm mb-2"
                        onclick="addRoomToCart(${room.id}, '${room.type}', ${room.price})"
                        ${!room.available ? "disabled='disabled'" : ""}>
                        ${room.available ? "Book Now" : "Booked"}
                    </button>

                    <button class="btn btn-danger btn-sm"
                        onclick="deleteRoom(${room.id})">
                        Delete
                    </button>
                    </div>
                </div>
            `;
        });
    });
}

// ✅ ADD ROOM
function addRoom() {
    let data = {
        roomNumber: document.getElementById("roomNumber").value,
        type: document.getElementById("roomType").value,
        price: document.getElementById("roomPrice").value,
        available: true
    };

    fetch('/rooms', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => loadRooms());
}

// ✅ DELETE ROOM
function deleteRoom(id) {
    fetch(`/rooms/${id}`, {
        method: 'DELETE'
    }).then(() => loadRooms());
}


function payNow() {

    let totalAmount = cart.reduce((sum, item) => sum + item.total, 0);

    if (totalAmount === 0) {
        alert("Cart is empty!");
        return;
    }

    let options = {
        key: "rzp_test_SddOFrKio16DT7",  // 🔴 your Razorpay key
        amount: totalAmount * 100,
        currency: "INR",
        name: "Food & Hospitality System",
        description: "Order Payment",

        handler: function (response) {

            let items = cart.map(i => i.item).join(", ");
            let totalAmount = cart.reduce((sum, i) => sum + i.total, 0);

            // ✅ SAVE ORDER TO BACKEND
            fetch("/orders", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    items: items,
                    total: totalAmount
                })
            });

            alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);

            // clear cart
            cart = [];
            renderCart();
        },

        theme: {
            color: "#3399cc"
        }
    };

    let rzp = new Razorpay(options);
    rzp.open();
}

// ================= LOGIN FUNCTIONS =================
function showLogin() {
    document.getElementById("loginBox").style.display = "block";
}

function closeLogin() {
    document.getElementById("loginBox").style.display = "none";
}


function handleAuth() {
    let user = localStorage.getItem("user");

    if (user) {
        logout();
    } else {
        showLogin();
    }
}


function register() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    }).then(() => alert("Registered!"));
}

function login() {
    fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value.trim()
        })
    })
    .then(res => res.text())
    .then(data => {

        console.log("Response:", data); // debug

        if (data === "SUCCESS") {
            alert("Login Successful");
            localStorage.setItem("user", "loggedIn");
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("appContent").style.display = "block";
        } else {
            alert("Invalid Credentials");
        }
    });
}

// ================= INIT =================

document.addEventListener("DOMContentLoaded", function () {

    // ✅ CHECK LOGIN
    let user = localStorage.getItem("user");

    if (user) {
        document.getElementById("appContent").style.display = "block";
        document.querySelector(".btn-light").innerText = user;
    } else {
        showLogin();
    }

    // food events
    document.getElementById("item")?.addEventListener("change", updatePrice);
    document.getElementById("qty")?.addEventListener("input", updatePrice);

    // load everything
    loadMenu();
    loadRooms();
});

function logout() {
    localStorage.removeItem("user");

    document.getElementById("appContent").style.display = "none";
    document.querySelector(".btn-light").innerText = "Login";

    showLogin();
}

</script>

</body>
</html>
